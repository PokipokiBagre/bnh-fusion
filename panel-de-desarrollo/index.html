<!DOCTYPE html>
<html lang="es">
<head>
    <script src="../bnh-guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Máster — BNH</title>
    <link rel="icon" type="image/png" id="dynamic-favicon">
    <link rel="stylesheet" href="../stylepanel.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        .top-tabs { background: #050a14; border-bottom: 1px solid #0d2035; display: flex; gap: 20px; padding: 0 20px; }
        .top-tab { padding: 15px 10px; cursor: pointer; color: #888; text-transform: uppercase; font-family: 'Rajdhani', sans-serif; letter-spacing: 1px; font-size: 0.9em; border-bottom: 2px solid transparent; transition: 0.2s; }
        .top-tab:hover { color: #c8d8e8; }
        .top-tab.active { color: #00b4d8; border-bottom: 2px solid #00b4d8; font-weight: bold; }
    </style>
</head>
<body>

<header class="app-header">
    <div class="header-top">
        <a href="../index.html" class="header-logo">◀ <span>BNH</span>&nbsp;Panel Máster</a>
        <div id="bnh-session-badge"></div>
    </div>
</header>

<main class="app-main" style="padding: 0;">
    <div id="pantalla-carga" class="empty-state" style="padding-top: 50px;">
        <div class="spinner" style="width:32px; height:32px; margin: 0 auto 16px;"></div>
        <p>Cargando sistema...</p>
    </div>

    <div id="access-denied" class="oculto empty-state" style="padding-top: 50px;">
        <h3>ACCESO DENEGADO</h3>
        <p>Este panel es de uso exclusivo para la administración (OP).</p>
    </div>

    <div id="interfaz-master" class="oculto">
        <div class="top-tabs">
            <div class="top-tab active" id="tab-stats" onclick="window.cambiarPestana('stats')">Agrupación de Cuentas</div>
            <div class="top-tab" id="tab-pagina" onclick="window.cambiarPestana('pagina')">Editar Web</div>
        </div>

        <div id="vista-stats" style="padding: 24px;">
            <div class="selector-controls" style="display: flex; gap: 12px; align-items: center; margin-bottom: 20px;">
                <button class="btn btn-green" id="btn-filtro-sueltos" onclick="window.cambiarFiltro('sueltos')">Sueltos (Sin Refinar)</button>
                <button class="btn btn-outline" id="btn-filtro-agrupados" onclick="window.cambiarFiltro('agrupados')">Agrupados</button>
                <input type="text" id="dev-search" class="inp" style="flex: 1; max-width: 300px;" placeholder="🔍 Buscar personaje..." oninput="window.filtrarPorNombre(this.value)">
            </div>
            
            <div class="character-selector" id="dev-character-list" style="display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px;"></div>
            
            <div id="content-stats" style="margin-top: 24px; max-width: 600px;">
                <div style="color:#666; font-style:italic;">Selecciona un personaje de la lista para agruparlo.</div>
            </div>
        </div>

        <div id="vista-pagina" class="oculto" style="padding: 24px;">
            <div id="content-pagina"></div>
        </div>
    </div>
</main>

<script type="module" src="dev-main.js"></script>
</body>
</html>
