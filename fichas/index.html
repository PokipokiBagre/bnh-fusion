<!DOCTYPE html>
<html lang="es">
<head>
    <script src="../bnh-guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fichas — BNH</title>
    <link rel="icon" type="image/png" id="dynamic-favicon">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../stylefichas.css">
</head>
<body>

<header class="app-header">
    <div class="header-top">
        <a href="../index.html" class="header-logo">◀ <span>BNH</span>&nbsp;Fichas</a>
        <div id="bnh-session-badge"></div>
    </div>
</header>

<!-- Tags activos bar (oculta si no hay filtros) -->
<div id="active-tags-bar" class="active-tags-bar" style="display:none;"></div>

<!-- Layout principal con sidebar + contenido -->
<div id="fichas-layout" class="fichas-layout">

    <!-- Sidebar de tags -->
    <aside id="fichas-sidebar" class="fichas-sidebar">
        <div style="padding:20px; text-align:center;">
            <div class="spinner" style="margin:0 auto;"></div>
        </div>
    </aside>

    <!-- Zona de contenido -->
    <section class="fichas-content">
        <!-- Topbar del contenido -->
        <div class="content-topbar">
            <span id="fichas-count-info" class="content-topbar-info">Cargando…</span>
        </div>
        <!-- Grid de fichas -->
        <div id="fichas-grid-area" class="fichas-grid"></div>
    </section>

</div>

<!-- Vista detalle (fuera del layout booru) -->
<div id="fichas-detalle-wrap" style="display:none; padding:0 16px 20px;">
    <div id="fichas-contenido"></div>
</div>

<!-- Toast -->
<div id="fichas-toast"></div>

<!-- Modal OP -->
<div id="op-overlay" class="op-modal-overlay" style="display:none;"></div>

<script type="module" src="fichas-main.js"></script>
</body>
</html>
