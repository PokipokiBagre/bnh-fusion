<!DOCTYPE html>
<html lang="es">
<head>
    <script src="../bnh-guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medallas — BNH</title>
    <link rel="icon" type="image/png" id="dynamic-favicon">
    <link rel="stylesheet" href="../stylemedallas.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
</head>
<body>

<header class="app-header">
    <div class="header-top">
        <a href="../index.html" class="header-logo">◀ <span>BNH</span>&nbsp;Medallas</a>
        <div id="bnh-session-badge"></div>
    </div>
    <nav class="app-nav">
        <button class="nav-tab active" id="tab-catalogo"   onclick="window._medTab('catalogo')">🏅 Catálogo</button>
        <button class="nav-tab"        id="tab-grafo"      onclick="window._medTab('grafo')">🧱 Bloques</button>
        <button class="nav-tab"        id="tab-personaje"  onclick="window._medTab('personaje')">👤 Personaje</button>
    </nav>
</header>

<main class="app-main">
    <div id="pantalla-carga" style="text-align:center;padding:60px 20px;">
        <div class="spinner" style="width:32px;height:32px;margin:0 auto 16px;"></div>
        <p>Cargando medallas…</p>
    </div>

    <div id="interfaz-medallas" class="oculto">
        <div id="vista-catalogo"></div>
        <div id="vista-grafo"     class="oculto"></div>
        <div id="vista-personaje" class="oculto"></div>
    </div>
</main>

<!-- Medalla detail / form modal -->
<div id="medalla-modal" style="display:none;"></div>

<div id="toast-msg"></div>
<script type="module" src="medallas-main.js"></script>
</body>
</html>
