<!DOCTYPE html>
<html lang="es">
<head>
    <script src="../bnh-guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags — BNH</title>
    <link rel="icon" type="image/png" id="dynamic-favicon">
    <link rel="stylesheet" href="../styletags.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
</head>
<body>

<header class="app-header">
    <div class="header-top">
        <a href="../index.html" class="header-logo">◀ <span>BNH</span>&nbsp;Tags</a>
        <div id="bnh-session-badge"></div>
    </div>
<nav class="app-nav">
        <button class="nav-tab active" id="tab-progresion"   onclick="window._tagsTab('progresion')">📈 Progresión</button>
        <button class="nav-tab"        id="tab-catalogo"     onclick="window._tagsTab('catalogo')">📖 Catálogo</button>
        <button class="nav-tab"        id="tab-estadisticas" onclick="window._tagsTab('estadisticas')">📊 Estadísticas</button>
        <button class="nav-tab"        id="tab-baneados"     onclick="window._tagsTab('baneados')" style="display:none;">🚫 Tags Baneados</button>
    </nav>
</header>

<main class="app-main">
    <div id="pantalla-carga" style="text-align:center;padding:60px 20px;">
        <div class="spinner" style="width:32px;height:32px;margin:0 auto 16px;"></div>
        <p>Cargando tags…</p>
    </div>

    <div id="interfaz-tags" class="oculto">
        <div id="vista-progresion"></div>
        <div id="vista-catalogo"     class="oculto"></div>
        <div id="vista-estadisticas" class="oculto"></div>
        <div id="vista-baneados"     class="oculto"></div>
    </div>
</main>

<!-- Tag detalle modal -->
<div id="tag-detalle-modal" style="display:none;"></div>

<div id="toast-msg"></div>
<script type="module" src="tags-main.js"></script>
</body>
</html>
